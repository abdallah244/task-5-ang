<form (ngSubmit)="sendPost()" #formRef="ngForm">
  <input
    type="email"
    [(ngModel)]="newPost.email"
    name="email"
    placeholder="email"
    required
  /><br />

  <input
    type="password"
    [(ngModel)]="newPost.password"
    name="password"
    placeholder="password"
    required
  /><br />

  <button type="submit">log in</button>
</form>

<div *ngIf="showModal" [ngClass]="['modal', isError ? 'error' : 'success']">
  <p>{{ modalMessage }}</p>
  <button (click)="closeModal()">close</button>
</div>
